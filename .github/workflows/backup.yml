name: KOT Sales DB Backup

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    container:
      image: postgres:17

    steps:
      - name: Dump DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          FILE="backup_$(date +%F).sql.gz"
          pg_dump "$DATABASE_URL" | gzip > "$FILE"
          test -s "$FILE"
          echo "BACKUP_FILE=$FILE" >> $GITHUB_ENV

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: ${{ env.BACKUP_FILE }}
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}

      - name: Keep only latest 14 backups in Drive
        env:
          GDRIVE_CREDENTIALS_B64: ${{ secrets.GDRIVE_CREDENTIALS }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          set -euo pipefail
          apt-get update
          apt-get install -y python3 python3-venv

          python3 -m venv /tmp/venv
          . /tmp/venv/bin/activate
          pip install --no-cache-dir google-auth requests

          python <<'PY'
          import base64
          import json
          import os

          import requests
          from google.oauth2 import service_account
          from google.auth.transport.requests import Request

          creds_json = base64.b64decode(os.environ["GDRIVE_CREDENTIALS_B64"]).decode("utf-8")
          info = json.loads(creds_json)

          creds = service_account.Credentials.from_service_account_info(
              info,
              scopes=["https://www.googleapis.com/auth/drive"],
          )
          creds.refresh(Request())
          token = creds.token

          folder_id = os.environ["GDRIVE_FOLDER_ID"]

          headers = {"Authorization": f"Bearer {token}"}
          params = {
              "q": f"'{folder_id}' in parents and trashed = false",
              "fields": "files(id,name,createdTime),nextPageToken",
              "orderBy": "createdTime desc",
              "pageSize": 100,
              "includeItemsFromAllDrives": "true",
              "supportsAllDrives": "true",
          }

          files = []
          page_token = None

          while True:
              if page_token:
                  params["pageToken"] = page_token
              else:
                  params.pop("pageToken", None)

              r = requests.get(
                  "https://www.googleapis.com/drive/v3/files",
                  headers=headers,
                  params=params,
                  timeout=60,
              )
              r.raise_for_status()
              data = r.json()
              files.extend(data.get("files", []))
              page_token = data.get("nextPageToken")
              if not page_token:
                  break

          backups = [
              f for f in files
              if f["name"].startswith("backup_") and f["name"].endswith(".sql.gz")
          ]

          delete = backups[14:]

          for f in delete:
              print(f"Deleting {f['name']}")
              dr = requests.delete(
                  f"https://www.googleapis.com/drive/v3/files/{f['id']}",
                  headers=headers,
                  params={"supportsAllDrives": "true"},
                  timeout=60,
              )
              dr.raise_for_status()
          PY

      - name: Delete local backup
        run: rm -f "${{ env.BACKUP_FILE }}"
