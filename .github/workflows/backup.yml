name: KOT Sales DB Backup

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    container:
      image: postgres:17

    steps:
      - name: Dump DB
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          set -euo pipefail
          pg_dump "$DATABASE_URL" | gzip > backup_$(date +%F).sql.gz
          test -s backup_$(date +%F).sql.gz

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@main
        with:
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: backup_*.sql.gz
          folderId: ${{ secrets.GDRIVE_FOLDER_ID }}
